name: 'Publish to BrewPage'
description: 'Publish CI artefacts -- HTML, markdown, multi-file sites, and files -- to BrewPage (https://brewpage.app) and expose the live URL as a job output.'
author: 'kochetkov-ma'

branding:
  icon: 'upload-cloud'
  color: 'purple'

inputs:
  path:
    description: 'File, directory, or .zip to publish.'
    required: true
  kind:
    description: 'Artefact kind: html | markdown | site | file | auto.'
    required: false
    default: 'auto'
  namespace:
    description: 'Target namespace. Empty derives a deterministic per-repo slug from github.repository. The default "public" namespace is gallery-listed on https://brewpage.app and search-indexed; set a private namespace to keep the resource unlisted.'
    required: false
    default: ''
  password:
    description: 'Optional password. When set, the resource is private (hidden from the brewpage.app gallery).'
    required: false
    default: ''
  ttl-days:
    description: 'Time to live in days (1..30).'
    required: false
    default: '15'
  tags:
    description: 'Comma-separated tags.'
    required: false
    default: ''
  owner-token:
    description: 'X-Owner-Token for the resource. Empty auto-mints a token that is surfaced in the job summary -- persist it as a secret for redeploys.'
    required: false
    default: ''
  update-id:
    description: 'Id of an existing resource. With owner-token, updates the existing resource (PUT) instead of creating a new one.'
    required: false
    default: ''
  entry:
    description: 'Site entry file override (default index.html).'
    required: false
    default: ''
  show-top-bar:
    description: 'HTML only: toggle the BrewPage toolbar.'
    required: false
    default: ''
  brewpage-url:
    description: 'API base URL override. Empty uses https://brewpage.app.'
    required: false
    default: ''
  fail-on-error:
    description: 'When false, warn instead of failing the step on error.'
    required: false
    default: 'true'

outputs:
  url:
    description: 'Live URL of the published resource on brewpage.app.'
  owner-url:
    description: 'API/owner URL for managing the resource.'
  owner-token:
    description: 'Owner token (masked in logs). Persist to a secret to manage/redeploy the resource.'
  id:
    description: 'Resource id.'
  namespace:
    description: 'Namespace the resource was published to.'
  expires-at:
    description: 'Expiry timestamp.'

runs:
  using: 'node24'
  main: 'dist/index.js'
