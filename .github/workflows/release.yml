name: Release

# AUTOMATED release. Fires when a semver tag (vX.Y.Z) is pushed. Versioning is
# tag-based: bump package.json, then `git tag -a vX.Y.Z && git push origin vX.Y.Z`.
#
# What this does, hands-off:
#   1. Rebuild the bundle and FAIL if the committed dist/ drifted (consumers run
#      dist/, so a tag must point at a commit whose dist/ matches source).
#   2. Create a GitHub Release for the tag (softprops/action-gh-release).
#   3. Move the major tag (e.g. v1) to this commit and force-push it, so
#      `kochetkov-ma/brewpage-action@v1` consumers auto-pick up the new release.
#
# MARKETPLACE: creating a GitHub Release for a repo that holds an action.yml
# updates the GitHub Actions Marketplace listing automatically -- but ONLY after
# the action has been listed once. The VERY FIRST listing requires a one-time
# manual Terms-of-Service acceptance: open the auto-created Release in the GitHub
# UI, tick "Publish this Action to the GitHub Marketplace", accept the developer
# agreement, confirm category + branding, and publish. Every release after that
# is fully automatic via this workflow.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Rebuild bundle
        run: npm run build

      - name: Verify committed dist/ matches rebuild
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::Tagged commit has a stale dist/. Refusing to release."
            git diff --stat -- dist/
            exit 1
          fi
          echo "dist/ in sync -- safe to release"

      - name: Build release notes header
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Quoted heredoc: NOTHING inside expands. The literal
          # ${{ steps.publish.outputs.url }} below is written verbatim so it
          # reaches the published notes (it would blank out if the release job's
          # Actions expression engine ever saw it). The tag is a placeholder
          # (__TAG__) substituted afterwards from $TAG via sed.
          cat > release-notes-header.md <<'EOF'
          ## Publish to BrewPage __TAG__

          Marketplace: https://github.com/marketplace/actions/publish-to-brewpage?version=__TAG__

          ### Quick start

          ```yaml
          - uses: kochetkov-ma/brewpage-action@v1
            id: publish
            with:
              path: ./report.html
          - run: echo "${{ steps.publish.outputs.url }}"
          ```

          Full inputs/outputs, redeploy flow and examples -> [README](https://github.com/kochetkov-ma/brewpage-action#readme)

          ---
          EOF
          # __TAG__ is not a shell/Actions expression, so sed replaces only it,
          # leaving the literal ${{ ... }} untouched.
          sed -i "s|__TAG__|${TAG}|g" release-notes-header.md
          echo "----- generated header -----"
          cat release-notes-header.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes-header.md
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move major tag to released commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          major="${TAG%%.*}"
          if [ "$major" = "$TAG" ] || [ -z "$major" ]; then
            echo "::error::Could not derive major tag from ${TAG}"
            exit 1
          fi
          echo "Moving major tag ${major} -> ${GITHUB_SHA}"
          git tag -f "$major" "$GITHUB_SHA"
          git push -f origin "refs/tags/${major}"
