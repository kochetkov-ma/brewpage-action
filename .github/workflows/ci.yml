name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Validate action.yml is well-formed YAML
        run: npx --yes js-yaml action.yml > /dev/null

      - name: Assert required Marketplace metadata is present
        run: |
          set -euo pipefail
          for key in name description runs; do
            if ! grep -qE "^${key}:" action.yml; then
              echo "::error::action.yml is missing required top-level key: ${key}"
              exit 1
            fi
          done
          echo "action.yml metadata OK"
