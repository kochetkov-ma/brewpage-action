name: Release Please

# AUTOMATED versioning. Chosen approach: release-please.
#
# Why release-please over a manual workflow_dispatch "bump" job:
#   - Fully hands-off: parses Conventional Commits on main, maintains
#     package.json `version` + CHANGELOG.md, and keeps an always-open
#     "release PR" that accumulates pending changes.
#   - Merging that PR is the single human gesture; it then creates the
#     vX.Y.Z git tag automatically, which triggers release.yml -> GitHub
#     Release -> Marketplace update -> major-tag move. No manual `npm version`,
#     no manual tag push, no risk of version/tag drift.
#   - A workflow_dispatch bump job would still require a human to pick
#     patch/minor/major every time and offers no changelog -- strictly more
#     manual surface for the same outcome.
#
# Conventional Commit prefixes drive the bump: fix: -> patch, feat: -> minor,
# `feat!:` or `BREAKING CHANGE:` -> major.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5.0.0
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
